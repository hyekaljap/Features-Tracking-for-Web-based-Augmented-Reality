<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR Feature-based Tracker</title>

    <link rel="stylesheet" href="style.css">

    <!-- A-FRAME-->
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/three.js/build/ar.js"></script>

    <!-- AR.js -->
    <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>
</head>

<body>
    <div class="container">

        <h1>AR Feature-based Marker Tracker</h1>
        <p id="status">Loading OpenCV...</p>
        <p id="warning" style="color:#c0392b;font-size:0.85em;display:none;">
            ⚠️ Camera requires HTTPS or localhost. Open via a local server, not <code>file://</code>.
            Run: <code>python -m http.server 8000</code> then visit <code>http://localhost:8000</code>
        </p>

        <!-- Controls -->
        <div class="controls">
            <input type="file" id="fileInput" accept="image/*">
            <button id="generateBtn">Generate Features</button>
        </div>

        <!-- Image Processing -->
        <h2>Image Processing</h2>

        <div class="canvas-grid">

            <div>
                <h3>Original</h3>
                <canvas id="canvasInput"></canvas>
            </div>

            <div>
                <h3>Grayscale</h3>
                <canvas id="canvasGray"></canvas>
                <button id="saveGrayBtn">Save Grayscale</button>
            </div>

            <div>
                <h3>ORB Features</h3>
                <canvas id="canvasOutput"></canvas>
                <button id="saveOrbBtn">Save ORB Features</button>
            </div>

        </div>

        <!-- AR -->
        <h2>AR Scene</h2>

        <div class="ar-container">
            <div class="ar-wrapper">
                <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">

                    <a-marker type="pattern" url=""  id="arMarker">

                        <a-box id="cube" position="0 0.5 0" color="#4CC3D9"></a-box>

                        <a-sphere id="sphere" position="0 0.5 0"
                                  radius="0.4" color="#EF2D5E"
                                  visible="false"></a-sphere>

                        <a-cone id="cone" position="0 0.5 0"
                                radius-bottom="0.4" height="0.8"
                                color="#FFC65D"
                                visible="false"></a-cone>

                    </a-marker>

                    <a-entity camera></a-entity>
                </a-scene>
            </div>
        </div>

    </div>


    <!--OpenCV.js-->
     <script async src="opencv.js" onload="onOpenCvReady()"></script>

     <!-- JS LAST -->
    <script src="script.js"></script>
</body>
</html>
